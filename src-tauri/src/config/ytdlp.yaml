# yt-dlp Configuration Profiles
# ----------------------------
# This file defines how YouTube videos and playlists are queried and downloaded.
#
# Placeholders:
# {url}             - Target YouTube URL
# {output_template} - Full destination path template (handled by yt-dlp)

ytdlp:
  # Path to the yt-dlp binary
  program: "yt-dlp"

  # --- SYSTEM / PROBING ---

  # Get version string
  check_version:
    args:
      - "--version"

  # --- METADATA QUERIES ---

  # Get the final filename without downloading
  get_filename:
    args:
      - "--get-filename"
      - "--no-playlist"
      - "-o"
      - "%(title)s.%(ext)s"
      - "{url}"

  list_playlist:
    args:
      - "--flat-playlist"
      - "--print"
      - "%(webpage_url)s\t%(title)s"
      - "{url}"

  # --- Downloads ---

  download_video:
    # Full video download (best quality video + best quality audio)
    args:
      - "--newline"
      - "--no-quiet"
      - "--print"
      - "after_move:filepath"
      - "-f"
      - "bestvideo+bestaudio/best"
      - "--merge-output-format"
      - "mkv"
      - "-o"
      - "{output_template}"
      - "{url}"

  download_video_mp4:
    # Force MP4 format
    args:
      - "--newline"
      - "--no-quiet"
      - "--print"
      - "after_move:filepath"
      - "-f"
      - "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best"
      - "-o"
      - "{output_template}"
      - "{url}"

  download_audio_mp3:
    # Audio-only download, converted to MP3 on the fly
    args:
      - "--newline"
      - "--no-quiet"
      - "--print"
      - "after_move:filepath"
      - "-x"
      - "--audio-format"
      - "mp3"
      - "--audio-quality"
      - "2"
      - "-o"
      - "{output_template}"
      - "{url}"

  download_audio_aac:
    # Audio-only download, converted to AAC on the fly
    args:
      - "--newline"
      - "--no-quiet"
      - "--print"
      - "after_move:filepath"
      - "-x"
      - "--audio-format"
      - "m4a"
      - "--audio-quality"
      - "2"
      - "-o"
      - "{output_template}"
      - "{url}"

  download_video_h264:
    # Force H264 video codec
    args:
      - "--newline"
      - "--no-quiet"
      - "--print"
      - "after_move:filepath"
      - "-S"
      - "vcodec:h264,res,acodec:m4a"
      - "--recode-video"
      - "mp4"
      - "-o"
      - "{output_template}"
      - "{url}"

  download_video_h265:
    # Force H265 (HEVC) video codec
    args:
      - "--newline"
      - "--no-quiet"
      - "--print"
      - "after_move:filepath"
      - "-S"
      - "vcodec:h265,res,acodec:m4a"
      - "--recode-video"
      - "mkv"
      - "-o"
      - "{output_template}"
      - "{url}"
