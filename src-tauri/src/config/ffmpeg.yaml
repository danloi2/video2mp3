# FFmpeg Configuration Profiles
# ----------------------------
# This file defines the command-line arguments for various transcoding and 
# remuxing operations. 
# 
# Placeholders:
# {input}          - Source file path
# {output}         - Destination file path
# {audio_stream}   - Index of the selected audio stream (e.g. 0:1)
# {hw_codec}       - Automatically resolved hardware encoder (e.g. h264_nvenc)
# {tune}           - Software encoder tuning (film or grain)

ffmpeg:
  # Path to the ffmpeg binary
  program: "ffmpeg"

  # --- SYSTEM / PROBING ---

  # Get version string
  check_version:
    args:
      - "-version"

  # List available hardware acceleration types
  list_hwaccels:
    args:
      - "-hwaccels"

  # List available encoders
  list_encoders:
    args:
      - "-encoders"

  # Initialize a hardware device (used for verification)
  init_device:
    args:
      - "-hide_banner"
      - "-init_hw_device"
      - "{device_type}"
      - "-f"
      - "null"
      - "-"

  # --- AUDIO EXTRACTION ---

  # High-quality MP3 extraction
  extract_audio_mp3:
    args:
      - "-y"
      - "-i"
      - "{input}"
      - "-map"
      - "0:{audio_stream}"
      - "-c:a"
      - "libmp3lame"
      - "-q:a"
      - "2"
      - "-progress"
      - "pipe:1"
      - "-nostats"
      - "{output}"

  # AAC extraction (alternative high-efficiency format)
  extract_audio_aac:
    args:
      - "-y"
      - "-i"
      - "{input}"
      - "-map"
      - "0:{audio_stream}"
      - "-c:a"
      - "aac"
      - "-q:a"
      - "2"
      - "-progress"
      - "pipe:1"
      - "-nostats"
      - "{output}"

  # --- VIDEO REMUXING ---

  # Change container to MKV without re-encoding (copy streams)
  remux_mkv:
    args:
    - "-y"
    - "-fflags"
    - "+genpts"
    - "-i"
    - "{input}"
    - "-map"
    - "0"
    - "-c"
    - "copy"
    - "-progress"
    - "pipe:1"
    - "-nostats"
    - "{output}"

  # --- VIDEO TRANSCODING (H.264) ---

  # H.264 Software Encoding (libx264) - Best compatibility and quality
  encode_h264_software:
    args:
      - "-y"
      - "-i"
      - "{input}"
      - "-map"
      - "0:v:0"
      - "-map"
      - "0:{audio_stream}"
      - "-map"
      - "0:s?"
      - "-c:v"
      - "libx264"
      - "-crf"
      - "18"
      - "-tune"
      - "{tune}"          # film | grain
      - "-preset"
      - "slow"
      - "-profile:v"
      - "high"
      - "-level"
      - "4.1"
      - "-x264-params"
      - "ref=4:bframes=3:aq-mode=2"
      - "-c:a"
      - "ac3"
      - "-b:a"
      - "448k"
      - "-c:s"
      - "copy"
      - "-progress"
      - "pipe:1"
      - "-nostats"
      - "{output}"

  # --- Video H.264 (NVENC) ---

  encode_h264_nvenc:
    args:
      - "-y"
      - "-hwaccel"
      - "auto"
      - "-i"
      - "{input}"
      - "-map"
      - "0:v:0"
      - "-map"
      - "0:{audio_stream}"
      - "-map"
      - "0:s?"
      - "-c:v"
      - "h264_nvenc"
      - "-preset"
      - "slow"
      - "-rc"
      - "vbr"
      - "-cq"
      - "19"
      - "-profile:v"
      - "high"
      - "-c:a"
      - "ac3"
      - "-b:a"
      - "448k"
      - "-c:s"
      - "copy"
      - "-progress"
      - "pipe:1"
      - "-nostats"
      - "{output}"

  # --- Video H.264 (generic HW: QSV / AMF / VAAPI / VideoToolbox) ---

  encode_h264_hw:
    args:
      - "-y"
      - "-hwaccel"
      - "auto"
      - "-i"
      - "{input}"
      - "-map"
      - "0:v:0"
      - "-map"
      - "0:{audio_stream}"
      - "-map"
      - "0:s?"
      - "-c:v"
      - "{hw_codec}"     # h264_qsv | h264_amf | h264_vaapi | h264_videotoolbox
      - "-q:v"
      - "19"
      - "-c:a"
      - "ac3"
      - "-b:a"
      - "448k"
      - "-c:s"
      - "copy"
      - "-progress"
      - "pipe:1"
      - "-nostats"
      - "{output}"

  # --- VIDEO TRANSCODING (H.265 / HEVC) ---

  # H.265 Software Encoding (libx265) - Superior compression
  encode_h265_software:
    args:
      - "-y"
      - "-i"
      - "{input}"
      - "-map"
      - "0:v:0"
      - "-map"
      - "0:{audio_stream}"
      - "-map"
      - "0:s?"
      - "-c:v"
      - "libx265"
      - "-crf"
      - "20"
      - "-preset"
      - "slow"
      - "-x265-params"
      - "aq-mode=3:aq-strength=1.0:deblock=-1,-1"
      - "-c:a"
      - "aac"
      - "-b:a"
      - "192k"
      - "-c:s"
      - "copy"
      - "-progress"
      - "pipe:1"
      - "-nostats"
      - "{output}"

  # --- Video H.265 (NVENC) ---

  encode_h265_nvenc:
    args:
      - "-y"
      - "-hwaccel"
      - "auto"
      - "-i"
      - "{input}"
      - "-map"
      - "0:v:0"
      - "-map"
      - "0:{audio_stream}"
      - "-map"
      - "0:s?"
      - "-c:v"
      - "hevc_nvenc"
      - "-preset"
      - "slow"
      - "-rc"
      - "vbr"
      - "-cq"
      - "21"
      - "-c:a"
      - "aac"
      - "-b:a"
      - "192k"
      - "-c:s"
      - "copy"
      - "-progress"
      - "pipe:1"
      - "-nostats"
      - "{output}"

  # --- Video H.265 (generic HW: QSV / AMF / VAAPI / VideoToolbox) ---

  encode_h265_hw:
    args:
      - "-y"
      - "-hwaccel"
      - "auto"
      - "-i"
      - "{input}"
      - "-map"
      - "0:v:0"
      - "-map"
      - "0:{audio_stream}"
      - "-map"
      - "0:s?"
      - "-c:v"
      - "{hw_codec}"     # hevc_qsv | hevc_amf | hevc_vaapi | hevc_videotoolbox
      - "-q:v"
      - "21"
      - "-c:a"
      - "aac"
      - "-b:a"
      - "192k"
      - "-c:s"
      - "copy"
      - "-progress"
      - "pipe:1"
      - "-nostats"
      - "{output}"

  # --- Optional color correction (appended to any video profile) ---

  color_correction:
    extra_args:
      - "-color_primaries"
      - "bt709"
      - "-color_trc"
      - "bt709"
      - "-colorspace"
      - "bt709"

